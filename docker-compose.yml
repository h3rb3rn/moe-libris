services:
  libris-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moe-libris-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://libris:${POSTGRES_PASSWORD}@libris-db:5432/libris
      - NEO4J_URI=bolt://libris-graph:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - VALKEY_URL=redis://libris-valkey:6379/0
      - REGISTRY_REPO_URL=${REGISTRY_REPO_URL:-https://github.com/moe-sovereign/moe-libris-registry.git}
      - REGISTRY_SYNC_INTERVAL=${REGISTRY_SYNC_INTERVAL:-3600}
      - LIBRIS_NODE_ID=${LIBRIS_NODE_ID}
      - LIBRIS_PUBLIC_URL=${LIBRIS_PUBLIC_URL}
      - LIBRIS_ADMIN_KEY=${LIBRIS_ADMIN_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - registry-cache:/app/registry-cache
    depends_on:
      libris-db:
        condition: service_healthy
      libris-graph:
        condition: service_started
      libris-valkey:
        condition: service_healthy
    networks:
      - libris-internal

  libris-db:
    image: postgres:16-alpine
    container_name: moe-libris-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=libris
      - POSTGRES_USER=libris
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libris"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - libris-internal

  libris-graph:
    image: neo4j:5-community
    container_name: moe-libris-graph
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=[]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4jdata:/data
    networks:
      - libris-internal

  libris-valkey:
    image: valkey/valkey:8-alpine
    container_name: moe-libris-valkey
    restart: unless-stopped
    command: valkey-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - valkeydata:/data
    networks:
      - libris-internal

volumes:
  pgdata:
  neo4jdata:
  valkeydata:
  registry-cache:

networks:
  libris-internal:
    driver: bridge
