services:
  libris-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moe-libris-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      # DB + cache now live in the moe-infra stack (terra_checkpoints / terra_cache).
      # Connection strings reference container names reachable via moe-infra_default.
      - DATABASE_URL=postgresql+asyncpg://libris:${POSTGRES_PASSWORD}@terra_checkpoints:5432/libris
      - VALKEY_URL=redis://:${REDIS_PASSWORD}@terra_cache:6379/2
      # libris-graph stays in this stack (isolated Neo4j for federation data)
      - NEO4J_URI=bolt://libris-graph:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - REGISTRY_REPO_URL=${REGISTRY_REPO_URL:-https://github.com/moe-sovereign/moe-libris-registry.git}
      - REGISTRY_SYNC_INTERVAL=${REGISTRY_SYNC_INTERVAL:-3600}
      - LIBRIS_NODE_ID=${LIBRIS_NODE_ID}
      - LIBRIS_PUBLIC_URL=${LIBRIS_PUBLIC_URL}
      - LIBRIS_ADMIN_KEY=${LIBRIS_ADMIN_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - registry-cache:/app/registry-cache
    depends_on:
      libris-graph:
        condition: service_started
    networks:
      - libris-internal
      - moe-infra_default   # reach terra_checkpoints + terra_cache

  libris-graph:
    image: neo4j:5-community
    container_name: moe-libris-graph
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=[]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4jdata:/data
    networks:
      - libris-internal

volumes:
  neo4jdata:
  registry-cache:

networks:
  libris-internal:
    driver: bridge
  moe-infra_default:
    external: true   # created by moe-infra docker-compose — must be running first
